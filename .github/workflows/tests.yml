name: PW + Pytest + Allure (CI)

on:
  push:
  pull_request:
  workflow_dispatch:

# Opt into Node.js 24 for JavaScript-based actions (checkout/setup-* etc.)
# This addresses the Node 20 deprecation warning. [1](https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test-and-report:
    runs-on: [self-hosted, windows]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # Ensure node + npm exist on the runner for your "run: npm ..."
      - name: Set up Node.js (for npm / Allure CLI)
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Verify Node/npm
        shell: powershell
        run: |
          node -v
          npm -v

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        shell: powershell
        run: |
          python -m playwright install

      - name: Run tests (produce allure-results)
        shell: powershell
        run: |
          pytest -q --alluredir=allure-results

      - name: Install Allure CLI (npm)
        if: always()
        shell: powershell
        run: |
          npm install -g allure-commandline
          # Ensure the global npm bin folder is on PATH for subsequent steps (Windows self-hosted can miss this)
          $prefix = npm config get prefix
          Add-Content $env:GITHUB_PATH $prefix
          allure --version

      - name: Generate Allure HTML report
        if: always()
        shell: powershell
        run: |
          if (Test-Path "allure-results") {
            allure generate allure-results --clean -o allure-report
          } else {
            Write-Host "No allure-results folder found; skipping report generation."
          }

      - name: Upload Allure report (HTML)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report
          retention-days: 14

      - name: Upload Allure raw results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results
          retention-days: 14
